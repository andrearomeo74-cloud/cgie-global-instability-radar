<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CGIE Global Map</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      color: #1f2937;
    }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }
    h1 {
      text-align: center;
      margin-bottom: 8px;
    }
    .sub {
      text-align: center;
      color: #6b7280;
      margin-bottom: 20px;
    }
    .topbar {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 20px;
      margin-bottom: 24px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    .status {
      font-size: 28px;
      font-weight: bold;
      margin-top: 8px;
    }
    .meta {
      line-height: 1.8;
      margin-top: 12px;
    }
    iframe {
      width: 100%;
      height: 620px;
      border: 0;
      border-radius: 16px;
      background: white;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    .changes {
      margin-top: 12px;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🌍 CGIE Global Instability Radar</h1>
    <div class="sub">Public demo, live state plus global seismic map</div>

    <div class="topbar">
      <div class="card">
        <div><strong>Live alert state</strong></div>
        <div id="status" class="status">Loading...</div>
        <div id="summary" class="meta"></div>
        <div id="changes" class="changes"></div>
      </div>

      <div class="card">
        <div><strong>Current snapshot</strong></div>
        <div id="snapshot" class="meta">Loading...</div>
      </div>
    </div>

    <iframe src="./index.html"></iframe>
  </div>

  <script>
    fetch("./outputs/latest/alert.json?cache=" + new Date().getTime())
      .then(r => r.json())
      .then(data => {
        const status = document.getElementById("status");
        const summary = document.getElementById("summary");
        const changes = document.getElementById("changes");
        const snapshot = document.getElementById("snapshot");

        if (data.alert) {
          status.textContent = "🚨 " + (data.level || "alert").toUpperCase();
          status.style.color = data.risk_color || "red";
          summary.innerHTML = data.summary || "Alert detected";

          if (data.changes) {
            changes.innerHTML = "<strong>Detected changes</strong><br>" +
              data.changes.map(x => "• " + x).join("<br>");
          }
        } else {
          status.textContent = "✅ STABLE";
          status.style.color = "green";
          summary.innerHTML = data.summary || "System stable";
          changes.innerHTML = "";
        }

        if (data.current) {
          snapshot.innerHTML = Object.entries(data.current)
            .map(([k, v]) => `• <strong>${k}</strong>: ${v}`)
            .join("<br>");
        }
      })
      .catch(() => {
        document.getElementById("status").textContent = "⚠ DATA UNAVAILABLE";
        document.getElementById("status").style.color = "crimson";
      });
  </script>
</body>
</html>
